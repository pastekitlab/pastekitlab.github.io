baseURL = 'https://pastekitlab.github.io/'
languageCode = 'zh-cn'
title = '我的博客'
theme = 'PaperMod'

enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  description = '一个 Hugo 高级博客'
  author = '你的名字'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  
  [params.homeInfoParams]
    Title = "欢迎来到我的博客"
    Content = "这里分享技术文章和心得"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yourusername"

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[taxonomies]
  tag = 'tags'
  category = 'categories'

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20
    
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 30
    
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 40
